# -----------------------------
# Namespace
# -----------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: omnipos

---
# -----------------------------
# Secret (Environment Variables)
# -----------------------------
apiVersion: v1
kind: Secret
metadata:
  name: omnipos-backend-secret
  namespace: omnipos
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/omnipos"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "super-secret-key"
  ENVIRONMENT: "production"

---
# -----------------------------
# Deployment
# -----------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnipos-backend
  namespace: omnipos
  labels:
    app: omnipos-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omnipos-backend
  template:
    metadata:
      labels:
        app: omnipos-backend
    spec:
      containers:
        - name: omnipos-backend
          image: your-dockerhub/omnipos-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: omnipos-backend-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20

---
# -----------------------------
# Service
# -----------------------------
apiVersion: v1
kind: Service
metadata:
  name: omnipos-backend-service
  namespace: omnipos
spec:
  selector:
    app: omnipos-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---
# -----------------------------
# Ingress (Traefik)
# -----------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omnipos-backend-ingress
  namespace: omnipos
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: api.omnipos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omnipos-backend-service
                port:
                  number: 80